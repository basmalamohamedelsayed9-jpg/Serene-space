<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>log in</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css"
        integrity="sha512-Evv84Mr4kqVGRNSgIGL/F/aIDqQb7xQ2vcrdIwxfjThSH8CSR7PBEakCr51Ck+w+/U6swU2Im1vVX0SVk9ABhg=="
        crossorigin="anonymous" referrerpolicy="no-referrer">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

    <link
        href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500;600;700&family=Poppins:wght@300;400;500;600&display=swap"
        rel="stylesheet">
</head>

<body>
    <section class="logInHome">
        <div class="pic">
            <img src="WhatsApp Image 2026-07-20 at 5.22.50 PM.jpeg" alt="">
        </div>
        <div class="formSection">
            <h1 class="logInForm">Log In</h1>
            <form class="form" id="log">
                <div>
                    <label for="name">User Name:</label>
                    <div id="name" class="filed1">
                        <i class="fa-solid fa-circle-user"></i>

                        <input class="inName" type="text" name="userName" placeholder="Please enter your name">
                    </div>
                </div>


                <div> <label for="email">Email:</label>
                    <div id="email" class="filed2">
                        <i class="fa-solid fa-envelope bg-info"></i>

                        <input class="inEmail" type="email" name="email" placeholder="Please enter your email">
                    </div>
                </div>
                <button class="logInbtn">Log In</button>


            </form>
        </div>






    </section>
    <script src="app2.js"></script>
</body>

</html>
